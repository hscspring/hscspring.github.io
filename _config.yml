# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 长琴
subtitle: 知乎：长琴 | 公众号：技术与人
description: 一个 AI 算法工程师的技术与人文笔记 —— 大模型、强化学习、多模态、推理部署，也聊读书、哲学，以及对世界的思考。
keywords: AI, 大模型, LLM, 强化学习, 多模态, 推理部署, 哲学, 长琴
author: hscspring
# 用于 Open Graph、Twitter Card 等社交分享的封面图
image: https://yam.gift/og.jpg
language:
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://yam.gift
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - static/**
  - sayingview/sayings.yml
  - CNAME

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true # false
relative_link: false
future: true
highlight:
    enable: true
    line_number: true
    auto_detect: false
    tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# index_generator:
#     per_page: 10

category_generator:
    per_page: 0

archive_generator:
    per_page: 0
    yearly: true
    monthly: false

tag_generator:
    per_page: 0

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: cyanstyle


# markdown-it 渲染 + KaTeX 插件（服务端预渲染公式）
# https://github.com/hexojs/hexo-renderer-markdown-it
markdown:
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
    quotes: '“”‘’'
  plugins:
    - name: '@renbaoshuo/markdown-it-katex'
      options:
        throwOnError: true
  anchors:
    level: 2
    collisionSuffix: ''


# RSS 订阅
plugin:
    hexo-generator-feed

feed:
    type: atom
    path: atom.xml
    limit: 20
    hub:
    content: true
    order_by: -date
    icon: icon.png
    autodiscovery: true
    template:

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
    type: git
    repo:
        github: git@github.com:hscspring/hscspring.github.io.git
    branch: master

toc:
    maxdepth: 3
    slugify: false
