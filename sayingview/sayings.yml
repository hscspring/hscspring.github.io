- text: 如果你认为编写代码的速度是你的问题，那你面临的问题更大。
  source: If You Thought the Speed of Writing Code Was Your Problem, You Have Bigger Problems
  author: Andrew Murphy
  url: https://andrewmurphy.io/blog/if-you-thought-the-speed-of-writing-code-was-your-problem-you-have-bigger-problems
  via: 科技爱好者周刊 第 392 期
  via_url: https://www.ruanyifeng.com/blog/2026/04/weekly-issue-392.html
  tags: [编程, 速度, 问题]
  date: 2026-04-25
  comment: 我说过很多次，打字从来不是瓶颈。只要你真的想清楚了，代码就像 flow。

- text: 客户端的每一个请求都不可信任，必须假定是恶意请求。以后，现实生活恐怕也是这样：每一个陌生人都不可信任，必须假定是恶意骗局。
  source: axios Compromised on npm - Malicious Versions Drop Remote Access Trojan
  author: stepsecurity
  url: https://www.stepsecurity.io/blog/axios-compromised-on-npm-malicious-versions-drop-remote-access-trojan
  via: 科技爱好者周刊 第 392 期
  via_url: https://www.ruanyifeng.com/blog/2026/04/weekly-issue-392.html
  tags: [安全, 信任, 恶意]
  date: 2026-04-25
  comment: 0信任假设从网络走向实体，问题是如何鉴权？

- text: 程序员的工作不是编程，而是通过抽象，来管理软件的复杂性。如果你做到了这一点，那么编程就很容易了。
  source: Your Job Isn't Programming
  author: Chris Krycho
  url: https://codeandcake.dev/posts/2025-12-12-your-job-isnt-programming
  tags: [编程, 抽象, 复杂性]
  date: 2026-04-25
  comment: 很多人以为编程=写代码，难怪他们会被 AI 替代。

- text: 写作的目的不在于写完，而在于增进你自己的理解，进而增进周围人的理解。让 AI 为你写作，就像花钱请人为你健身一样。
  source: Don't Let AI Write For You
  author: Alex Woods
  url: https://alexhwoods.com/dont-let-ai-write-for-you/
  tags: [写作, AI]
  date: 2026-04-25
  comment: 我非常反感用 AI 写博客就是这个原因。很多人根本就是为了写而写，根本不知道写作的意义。

